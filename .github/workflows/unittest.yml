# Does a headless localhost unit testing of the backend.
# Checks that the backend works if not connected to the internet.
name: Unit Testing

on: 
    push: 
        branches: [dev]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v3
              with:
                    python-version: ${{ matrix.python-version }}
            - run: cd backend
            - run: pip install requirements.txt
            - run: pytest scripts/testing.py
