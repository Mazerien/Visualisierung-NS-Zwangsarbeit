{% extends "base.html" %}

{% block title %} Map {% endblock title %}

{% block body %}
{% if web_map %}
    {{ web_map|safe }}
{% endif %}

<form method="GET" action="{{ url_for('map') }}">
    <input type="text" name="city" placeholder="Schwenningen">
    <input type="text" name="area" placeholder="Villingen-Schwenningen">
    <input type="text" name="country" placeholder="Germany">
    <button type="submit">Create map of city</button>
</form>
{% endblock body %}
