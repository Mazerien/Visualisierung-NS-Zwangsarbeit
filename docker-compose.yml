#######################################################################
### This file creates Docker containers for a MySQL database,       ###
### the Directus headless CMS, and the Python backend with Flask.   ###
#######################################################################
services:
  directus:
    image: directus/directus:latest
    ports:
      - "8055:8055"
    networks:
      - app
  
  flask:
    build:
      context: backend/
    ports:
    - "5000:5000"
    depends_on:
      mysql:
        condition:
          service_started
    networks:
      - app

  mysql:
    image: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
    - "3306:3306"
    networks:
      - app

networks:
  app:
    driver: bridge
