#######################################################################
### This file creates Docker containers for a MySQL database,       ###
### the Cockpit headless CMS, and the Python backend with Flask.    ###
#######################################################################
services:
  # MySQL
  db:
    image: mysql
    container_name: db
    restart: always
    volumes:
      - ./data:/var/lib/mysql/
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${SQL_PASSWORD}
      MYSQL_DATABASE: ${SQL_DB}
      MYSQL_USER: ${SQL_USER}
      MYSQL_PASSWORD: ${SQL_PASSWORD}
    networks:
      - app
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 5
  
  # Python backend
  flask:
    container_name: app
    build:
      context: .
      dockerfile: dockerfile 
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition:
          service_healthy
    networks:
      - app

  
  # Cockpit CMS
  cockpit:
    image: cockpithq/cockpit:core-latest
    container_name: cockpit
    ports:
      - 8080:80
    volumes:
      - ./cockpit/storage:/var/www/html/storage
      - ./cockpit/config:/var/www/html/config

    depends_on:
      - db
    networks:
      - app

networks:
  app:
    driver:  bridge