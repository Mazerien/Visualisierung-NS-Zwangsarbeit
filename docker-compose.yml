#######################################################################
### This file creates Docker containers for a MySQL database,       ###
### the Directus headless CMS, and the Python backend with Flask.   ###
#######################################################################
services:
  directus:
    image: directus/directus:latest
    volumes:
      - nszw:/var/lib/directus
    description: "Directus headless CMS"
    restart: always
    ports:
      - "8055:8055"
    environment:
      DB_CLIENT: "mysql"
      DB_HOST: "mysql"
      DB_PORT: "3306"
      DB_DATABASE: directus
      DB_USER: mysql
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app

  flask:
    image: python:slim
    description: "Flask app"
    volumes:
      - nszw:/var/lib/flask
    build:
      context: backend/
      dockerfile: dockerfile
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app

  mysql:
    image: mysql:latest
    description: "MySQL database"
    volumes:
      - db:/var/lib/mysql
    restart: always
    environment:
      MYSQL_DATABASE: directus
      MYSQL_USER: mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 30s
      retries: 5
      start_period: 10s
    networks:
      - app

networks:
  app:
    driver: bridge
  

volumes:
  nszw:
  db:
    