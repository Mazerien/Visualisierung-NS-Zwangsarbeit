services:
  db:
    image: mysql
    container_name: db
    restart: always
    volumes:
      - ./data:/var/lib/mysql/
    environment:
      MYSQL_ROOT_PASSWORD: ${SQL_PASSWORD}
      MYSQL_DATABASE: ${SQL_DB}
      MYSQL_USER: ${SQL_USER}
      MYSQL_PASSWORD: ${SQL_PASSWORD}
  
  flask:
    container_name: app
    build:
      context: .
      dockerfile: dockerfile 
    ports:
      - "5000:5000"
    depends_on:
      - db