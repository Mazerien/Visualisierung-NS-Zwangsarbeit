#######################################################################
### This file creates Docker containers for a MySQL database,       ###
### the Cockpit headless CMS, and the Python backend with Flask.    ###
#######################################################################
services:
  # MySQL
  db:
    image: mysql
    container_name: db
    restart: always
    volumes:
      - ./data:/var/lib/mysql/
    environment:
      MYSQL_ROOT_PASSWORD: ${SQL_PASSWORD}
      MYSQL_DATABASE: ${SQL_DB}
      MYSQL_USER: ${SQL_USER}
      MYSQL_PASSWORD: ${SQL_PASSWORD}
  
  # Python backend
  flask:
    container_name: app
    build:
      context: .
      dockerfile: dockerfile 
    ports:
      - "5000:5000"
    depends_on:
      - db
  
  # Cockpit CMS
  cockpit:
    image: cockpithq/cockpit:core-latest
    container_name: cockpit
    ports:
      - 8080:80
    restart: unless-stopped
    depends_on:
      - db