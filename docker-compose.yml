#######################################################################
### This file creates Docker containers for a MySQL database,       ###
### the Directus headless CMS, and the Python backend with Flask.   ###
#######################################################################
services:
  flask:
    image: python:slim
    description: "Flask app"
    volumes:
      - nszw:/var/lib/flask
    build:
      context: backend/
      dockerfile: dockerfile
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app

networks:
  app:
    driver: bridge
  

volumes:
  nszw:
  db:
    