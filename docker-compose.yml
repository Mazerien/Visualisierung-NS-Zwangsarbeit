#######################################################################
### This file creates Docker containers for a MySQL database,       ###
### the Directus headless CMS, and the Python backend with Flask.   ###
#######################################################################
services:
  flask:
    image: python:slim
    description: "Flask backend"
    volumes:
      - nszw:/var/lib/flask
    build:
      context: backend/
      dockerfile: dockerfile
    restart: always
    ports:
      - "5000:5000"
    networks:
      - app
  
  react:
    image: node:latest
    description: "React frontend"
    volumes:
      - nszw:/var/lib/react
    build:
      context: frontend/
      dockerfile: dockerfile
    restart: always
    ports:
      - "3000:3000"
    networks:
      - app


networks:
  app:
    driver: bridge
  

volumes:
  nszw:
  db:
    